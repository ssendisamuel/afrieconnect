<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — AfrieConnect</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="/assets/css/app.css" rel="stylesheet">
</head>
<body class="bg-grid auth-page">

  <div class="container px-3">
    <div class="auth-card mx-auto">
      <div class="text-center mb-4">
        <a class="brand-logo d-inline-block mb-3" href="/index.html">
          <span style="color:#dc2626">Afrie</span><span class="brand-sms">Connect</span>
        </a>
        <h4 class="fw-bold mb-1">Create Account</h4>
        <p class="text-muted small">Start sending SMS and WhatsApp today</p>
      </div>

      <div id="auth-alert"></div>

      <form id="register-form">
        <div class="mb-3">
          <label class="form-label">Full Name</label>
          <input type="text" name="name" class="form-control" placeholder="John Doe" required minlength="2">
        </div>
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" name="email" class="form-control" placeholder="you@company.com" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Phone Number</label>
          <input type="tel" name="phone" class="form-control" placeholder="+256 700 000 000">
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" name="password" class="form-control" placeholder="Min. 8 characters" required minlength="8">
        </div>
        <div class="mb-3">
          <label class="form-label">Confirm Password</label>
          <input type="password" name="confirmPassword" class="form-control" placeholder="Repeat password" required minlength="8">
        </div>
        <div class="form-check mb-4">
          <input class="form-check-input" type="checkbox" id="terms" name="terms" required>
          <label class="form-check-label small" for="terms">
            I agree to the <a href="#" class="text-primary">Terms of Service</a> and <a href="#" class="text-primary">Privacy Policy</a>
          </label>
        </div>
        <button type="submit" class="btn btn-accent w-100 btn-lg" data-default-text="Create Account">Create Account</button>
      </form>

      <p class="text-center text-muted small mt-4 mb-0">
        Already have an account? <a href="/login.html" class="text-primary fw-semibold">Sign in</a>
      </p>
    </div>
  </div>

  <script src="/assets/js/auth.js"></script>
</body>
</html>
