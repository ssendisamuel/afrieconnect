<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Message Logs - AfrieConnect Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="/assets/css/app.css" rel="stylesheet">
</head>
<body>
  <div id="app-shell"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/assets/js/app.js"></script>
  <script>
    (function () {
      if (!requireAuth() || !requireAdmin()) return;

      renderAppShell('admin-logs');

      let currentPage = 1;
      const pageLimit = 50;

      const content = document.getElementById('page-content');
      content.innerHTML = `
        <div class="mb-4">
          <h1 class="h4 mb-1">Message Logs</h1>
          <p class="text-muted mb-0">Platform-wide WhatsApp and SMS delivery logs</p>
        </div>

        <div class="content-card mb-4">
          <div class="row g-3 align-items-end">
            <div class="col-md-3">
              <label class="form-label small text-muted">User ID</label>
              <input type="number" class="form-control" id="filter-user-id" placeholder="e.g. 5" min="1">
            </div>
            <div class="col-md-2">
              <label class="form-label small text-muted">Channel</label>
              <select class="form-select" id="filter-channel">
                <option value="">All channels</option>
                <option value="whatsapp">WhatsApp</option>
                <option value="sms">SMS</option>
              </select>
            </div>
            <div class="col-md-2">
              <label class="form-label small text-muted">Status</label>
              <select class="form-select" id="filter-status">
                <option value="">All statuses</option>
                <option value="queued">Queued</option>
                <option value="sent">Sent</option>
                <option value="failed">Failed</option>
                <option value="delivered">Delivered</option>
              </select>
            </div>
            <div class="col-md-2">
              <button class="btn btn-primary w-100" id="btn-filter">
                <i class="bi bi-search me-1"></i> Filter
              </button>
            </div>
            <div class="col-md-2">
              <button class="btn btn-outline-secondary w-100" id="btn-clear">Clear</button>
            </div>
          </div>
        </div>

        <div class="content-card">
          <div id="logs-loading" class="text-center py-5">
            <div class="spinner-border text-primary" role="status"></div>
            <p class="text-muted mt-2">Loading logs...</p>
          </div>
          <div id="logs-error" class="alert alert-danger d-none"></div>
          <div class="table-responsive" id="logs-table-wrap" style="display:none">
            <table class="table table-hover align-middle mb-0">
              <thead class="table-light">
                <tr>
                  <th>Date</th>
                  <th>User</th>
                  <th>Phone</th>
                  <th>Channel</th>
                  <th>Message</th>
                  <th>Status</th>
                </tr>
              </thead>
              <tbody id="logs-tbody"></tbody>
            </table>
          </div>
          <p id="logs-empty" class="text-muted text-center py-4 d-none">No logs found.</p>
          <div class="d-flex align-items-center justify-content-between mt-3" id="pagination-wrap" style="display:none">
            <button class="btn btn-sm btn-outline-secondary" id="btn-prev" disabled>
              <i class="bi bi-chevron-left"></i> Previous
            </button>
            <span class="small text-muted" id="page-info"></span>
            <button class="btn btn-sm btn-outline-secondary" id="btn-next">
              Next <i class="bi bi-chevron-right"></i>
            </button>
          </div>
        </div>
      `;

      const userIdEl = document.getElementById('filter-user-id');
      const channelEl = document.getElementById('filter-channel');
      const statusEl = document.getElementById('filter-status');
      const loadingEl = document.getElementById('logs-loading');
      const errorEl = document.getElementById('logs-error');
      const tableWrap = document.getElementById('logs-table-wrap');
      const tbody = document.getElementById('logs-tbody');
      const emptyEl = document.getElementById('logs-empty');
      const paginationWrap = document.getElementById('pagination-wrap');
      const pageInfo = document.getElementById('page-info');
      const btnPrev = document.getElementById('btn-prev');
      const btnNext = document.getElementById('btn-next');

      let hasMore = false;

      function escapeHtml(str) {
        if (!str) return '';
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
      }

      function truncate(str, len) {
        if (!str) return '-';
        return str.length > len ? str.slice(0, len) + '...' : str;
      }

      async function loadLogs() {
        loadingEl.style.display = 'block';
        errorEl.classList.add('d-none');
        tableWrap.style.display = 'none';
        emptyEl.classList.add('d-none');
        paginationWrap.style.display = 'none';

        const params = new URLSearchParams({
          page: String(currentPage),
          limit: String(pageLimit)
        });
        if (userIdEl.value) params.set('user_id', userIdEl.value);
        if (channelEl.value) params.set('channel', channelEl.value);
        if (statusEl.value) params.set('status', statusEl.value);

        try {
          const data = await api(`/api/admin/logs?${params.toString()}`);
          const logs = data.logs || [];

          loadingEl.style.display = 'none';

          if (!logs.length) {
            emptyEl.classList.remove('d-none');
            btnPrev.disabled = currentPage <= 1;
            btnNext.disabled = true;
            return;
          }

          tbody.innerHTML = logs.map(log => `
            <tr>
              <td class="small text-muted">${formatDate(log.sent_at || log.created_at)}</td>
              <td>
                <div class="small fw-medium">${escapeHtml(log.user_name || '-')}</div>
                <div class="small text-muted">${escapeHtml(log.user_email || '')}</div>
              </td>
              <td class="small">${escapeHtml(log.phone)}</td>
              <td>${channelBadge(log.channel)}</td>
              <td class="small" title="${escapeHtml(log.message)}">${escapeHtml(truncate(log.message, 40))}</td>
              <td>${statusBadge(log.status)}</td>
            </tr>
          `).join('');

          tableWrap.style.display = 'block';
          paginationWrap.style.display = 'flex';

          hasMore = logs.length >= pageLimit;
          pageInfo.textContent = `Page ${currentPage}`;
          btnPrev.disabled = currentPage <= 1;
          btnNext.disabled = !hasMore;
        } catch (err) {
          loadingEl.style.display = 'none';
          errorEl.textContent = err.message;
          errorEl.classList.remove('d-none');
        }
      }

      document.getElementById('btn-filter').addEventListener('click', () => {
        currentPage = 1;
        loadLogs();
      });

      document.getElementById('btn-clear').addEventListener('click', () => {
        userIdEl.value = '';
        channelEl.value = '';
        statusEl.value = '';
        currentPage = 1;
        loadLogs();
      });

      btnPrev.addEventListener('click', () => {
        if (currentPage > 1) {
          currentPage--;
          loadLogs();
        }
      });

      btnNext.addEventListener('click', () => {
        if (hasMore) {
          currentPage++;
          loadLogs();
        }
      });

      loadLogs();
    })();
  </script>
</body>
</html>
