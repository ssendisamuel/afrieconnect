<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - AfrieConnect</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="/assets/css/app.css" rel="stylesheet">
</head>
<body>
<div id="app-shell"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/assets/js/app.js"></script>
<script>
(function () {
  if (!requireAuth() || !requireAdmin()) return;
  renderAppShell('admin-dashboard');

  document.getElementById('page-content').innerHTML = `
    <div class="mb-4">
      <h4 class="mb-1 fw-bold">Admin Dashboard</h4>
      <p class="text-muted mb-0">Platform overview — provider balances, user wallets, revenue</p>
    </div>

    <div class="row g-4 mb-4" id="stats-row">
      <div class="col-md-3"><div class="stat-card"><div class="stat-value" id="stat-egosms">—</div><div class="stat-label">SMS Provider Balance (UGX)</div></div></div>
      <div class="col-md-3"><div class="stat-card"><div class="stat-value" id="stat-liability">—</div><div class="stat-label">User Wallet Liability</div></div></div>
      <div class="col-md-3"><div class="stat-card"><div class="stat-value" id="stat-topups">—</div><div class="stat-label">Top-ups Today</div></div></div>
      <div class="col-md-3"><div class="stat-card"><div class="stat-value" id="stat-spend">—</div><div class="stat-label">SMS Spend Today</div></div></div>
    </div>

    <div class="row g-4 mb-4">
      <div class="col-md-3"><div class="stat-card"><div class="stat-value" id="stat-users">—</div><div class="stat-label">Total Users</div></div></div>
      <div class="col-md-3"><div class="stat-card"><div class="stat-value" id="stat-active">—</div><div class="stat-label">Active Users</div></div></div>
      <div class="col-md-3"><div class="stat-card"><div class="stat-value" id="stat-sms-today">—</div><div class="stat-label">SMS Sent Today</div></div></div>
      <div class="col-md-3"><div class="stat-card"><div class="stat-value" id="stat-pending">—</div><div class="stat-label">Pending Payments</div></div></div>
    </div>

    <div class="row g-4">
      <div class="col-lg-6">
        <div class="content-card table-card">
          <h6 class="fw-semibold mb-3">Recent Wallet Transactions</h6>
          <div class="table-responsive">
            <table class="table table-sm align-middle">
              <thead><tr><th>User</th><th>Type</th><th>Amount</th><th>Date</th></tr></thead>
              <tbody id="tx-body"><tr><td colspan="4" class="text-center py-3">Loading…</td></tr></tbody>
            </table>
          </div>
        </div>
      </div>
      <div class="col-lg-6">
        <div class="content-card table-card">
          <h6 class="fw-semibold mb-3">Recent MoMo Payments</h6>
          <div class="table-responsive">
            <table class="table table-sm align-middle">
              <thead><tr><th>User</th><th>Amount</th><th>Status</th><th>Date</th></tr></thead>
              <tbody id="pay-body"><tr><td colspan="4" class="text-center py-3">Loading…</td></tr></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  `;

  api('/api/admin/dashboard').then(data => {
    const s = data.stats;
    document.getElementById('stat-egosms').textContent = Number(s.egosms_balance || 0).toLocaleString();
    document.getElementById('stat-liability').textContent = Number(s.wallet_liability || 0).toLocaleString();
    document.getElementById('stat-topups').textContent = Number(s.topups_today || 0).toLocaleString();
    document.getElementById('stat-spend').textContent = Number(s.sms_spend_today || 0).toLocaleString();
    document.getElementById('stat-users').textContent = s.total_users;
    document.getElementById('stat-active').textContent = s.active_users;
    document.getElementById('stat-sms-today').textContent = s.sms_sent_today;
    document.getElementById('stat-pending').textContent = s.pending_payments;

    const txBody = document.getElementById('tx-body');
    txBody.innerHTML = (data.recent_transactions || []).map(t => `
      <tr>
        <td class="small">${t.user_name}<br><span class="text-muted">${t.user_email}</span></td>
        <td class="small">${t.type}</td>
        <td class="${t.amount >= 0 ? 'text-success' : 'text-danger'}">${Number(t.amount).toLocaleString()}</td>
        <td class="small">${formatDate(t.created_at)}</td>
      </tr>
    `).join('') || '<tr><td colspan="4" class="text-center text-muted">No transactions</td></tr>';

    const payBody = document.getElementById('pay-body');
    payBody.innerHTML = (data.recent_payments || []).map(p => `
      <tr>
        <td class="small">${p.user_name}</td>
        <td>UGX ${Number(p.amount).toLocaleString()}</td>
        <td>${statusBadge(p.status)}</td>
        <td class="small">${formatDate(p.created_at)}</td>
      </tr>
    `).join('') || '<tr><td colspan="4" class="text-center text-muted">No payments yet</td></tr>';
  }).catch(err => showToast(err.message, 'error'));
})();
</script>
</body>
</html>
