<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Detail - AfrieConnect Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="/assets/css/app.css" rel="stylesheet">
</head>
<body>
  <div id="app-shell"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/assets/js/app.js"></script>
  <script>
    (function () {
      if (!requireAuth() || !requireAdmin()) return;

      const userId = new URLSearchParams(window.location.search).get('id');
      if (!userId) {
        window.location.href = '/app/admin/users.html';
        return;
      }

      renderAppShell('admin-users');

      const content = document.getElementById('page-content');
      content.innerHTML = `
        <div class="d-flex align-items-center gap-3 mb-4">
          <a href="/app/admin/users.html" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-arrow-left"></i>
          </a>
          <div>
            <h1 class="h4 mb-0" id="page-title">User Detail</h1>
            <p class="text-muted mb-0 small" id="page-subtitle">Loading...</p>
          </div>
        </div>

        <div id="detail-loading" class="text-center py-5">
          <div class="spinner-border text-primary" role="status"></div>
        </div>
        <div id="detail-error" class="alert alert-danger d-none"></div>

        <div id="detail-content" style="display:none">
          <div class="row g-4">
            <div class="col-lg-5">
              <div class="content-card mb-4">
                <h2 class="h6 mb-3">Account Info</h2>
                <dl class="row small mb-0" id="user-info"></dl>
              </div>

              <div class="content-card mb-4">
                <h2 class="h6 mb-3"><i class="bi bi-whatsapp me-1"></i> WhatsApp Session</h2>
                <div id="wa-session-info"></div>
              </div>
            </div>

            <div class="col-lg-7">
              <div class="content-card mb-4">
                <h2 class="h6 mb-3">Add Wallet Funds (UGX)</h2>
                <form id="credits-form" class="row g-2 align-items-end">
                  <div class="col-sm-8">
                    <label class="form-label small">Amount in UGX</label>
                    <input type="number" class="form-control" name="amount" min="1000" step="500" required placeholder="e.g. 25000">
                  </div>
                  <div class="col-sm-4">
                    <button type="submit" class="btn btn-primary w-100">Add Funds</button>
                  </div>
                </form>
              </div>

              <div class="content-card mb-4">
                <h2 class="h6 mb-3">Change Plan</h2>
                <form id="plan-form" class="row g-2 align-items-end">
                  <div class="col-sm-8">
                    <label class="form-label small">Plan</label>
                    <select class="form-select" name="plan" id="plan-select">
                      <option value="free">Free</option>
                      <option value="starter">Starter</option>
                      <option value="business">Business</option>
                      <option value="enterprise">Enterprise</option>
                    </select>
                  </div>
                  <div class="col-sm-4">
                    <button type="submit" class="btn btn-primary w-100">Update Plan</button>
                  </div>
                </form>
              </div>

              <div class="content-card mb-4">
                <h2 class="h6 mb-3">Account Status</h2>
                <form id="status-form" class="row g-2 align-items-end">
                  <div class="col-sm-8">
                    <label class="form-label small">Status</label>
                    <select class="form-select" name="status" id="status-select">
                      <option value="active">Active</option>
                      <option value="pending">Pending</option>
                      <option value="suspended">Suspended</option>
                    </select>
                  </div>
                  <div class="col-sm-4">
                    <button type="submit" class="btn btn-warning w-100">Update Status</button>
                  </div>
                </form>
              </div>
            </div>
          </div>

          <div class="content-card">
            <h2 class="h6 mb-3">Recent Campaigns</h2>
            <div class="table-responsive">
              <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                  <tr>
                    <th>Name</th>
                    <th>Channel</th>
                    <th>Status</th>
                    <th>Sent</th>
                    <th>Failed</th>
                    <th>Created</th>
                  </tr>
                </thead>
                <tbody id="campaigns-tbody"></tbody>
              </table>
            </div>
            <p id="campaigns-empty" class="text-muted text-center py-3 d-none">No campaigns yet.</p>
          </div>
        </div>
      `;

      const loadingEl = document.getElementById('detail-loading');
      const errorEl = document.getElementById('detail-error');
      const detailContent = document.getElementById('detail-content');
      let currentUser = null;

      function escapeHtml(str) {
        if (!str) return '';
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
      }

      function renderUserInfo(user) {
        document.getElementById('page-title').textContent = user.name;
        document.getElementById('page-subtitle').textContent = user.email;

        document.getElementById('user-info').innerHTML = `
          <dt class="col-4 text-muted">ID</dt><dd class="col-8">${user.id}</dd>
          <dt class="col-4 text-muted">Name</dt><dd class="col-8">${escapeHtml(user.name)}</dd>
          <dt class="col-4 text-muted">Email</dt><dd class="col-8">${escapeHtml(user.email)}</dd>
          <dt class="col-4 text-muted">Phone</dt><dd class="col-8">${escapeHtml(user.phone || '-')}</dd>
          <dt class="col-4 text-muted">Plan</dt><dd class="col-8">${statusBadge(user.plan)}</dd>
          <dt class="col-4 text-muted">Status</dt><dd class="col-8">${statusBadge(user.status)}</dd>
          <dt class="col-4 text-muted">Wallet (UGX)</dt><dd class="col-8 fw-bold">UGX ${Number(user.wallet_balance ?? user.sms_credits ?? 0).toLocaleString()}</dd>
          <dt class="col-4 text-muted">Email Verified</dt><dd class="col-8">${user.email_verified ? '<span class="badge bg-success">Yes</span>' : '<span class="badge bg-secondary">No</span>'}</dd>
          <dt class="col-4 text-muted">API Key</dt><dd class="col-8"><code class="small">${escapeHtml(user.api_key || '-')}</code></dd>
          <dt class="col-4 text-muted">Joined</dt><dd class="col-8">${formatDate(user.created_at)}</dd>
        `;

        document.getElementById('plan-select').value = user.plan;
        document.getElementById('status-select').value = user.status;
      }

      function renderWaSession(session) {
        const el = document.getElementById('wa-session-info');
        if (!session) {
          el.innerHTML = '<p class="text-muted mb-0">No WhatsApp session configured.</p>';
          return;
        }

        el.innerHTML = `
          <dl class="row small mb-0">
            <dt class="col-4 text-muted">Status</dt><dd class="col-8">${statusBadge(session.status)}</dd>
            <dt class="col-4 text-muted">Phone</dt><dd class="col-8">${escapeHtml(session.phone_number || '-')}</dd>
            <dt class="col-4 text-muted">Display Name</dt><dd class="col-8">${escapeHtml(session.display_name || '-')}</dd>
            <dt class="col-4 text-muted">Daily Limit</dt><dd class="col-8">${session.daily_limit || '-'}</dd>
            <dt class="col-4 text-muted">Messages Sent</dt><dd class="col-8">${session.messages_sent || 0}</dd>
            <dt class="col-4 text-muted">Connected</dt><dd class="col-8">${formatDate(session.connected_at)}</dd>
            <dt class="col-4 text-muted">Last Active</dt><dd class="col-8">${formatDate(session.last_active)}</dd>
          </dl>
        `;
      }

      function renderCampaigns(campaigns) {
        const tbody = document.getElementById('campaigns-tbody');
        const emptyEl = document.getElementById('campaigns-empty');

        if (!campaigns || !campaigns.length) {
          tbody.innerHTML = '';
          emptyEl.classList.remove('d-none');
          return;
        }

        emptyEl.classList.add('d-none');
        tbody.innerHTML = campaigns.map(c => `
          <tr>
            <td class="fw-medium">${escapeHtml(c.name)}</td>
            <td>${channelBadge(c.channel)}</td>
            <td>${statusBadge(c.status)}</td>
            <td>${c.sent_count || 0}</td>
            <td>${c.failed_count || 0}</td>
            <td class="text-muted small">${formatDate(c.created_at)}</td>
          </tr>
        `).join('');
      }

      async function loadUser() {
        try {
          const data = await api(`/api/admin/users/${userId}`);
          currentUser = data.user;

          renderUserInfo(data.user);
          renderWaSession(data.wa_session);
          renderCampaigns(data.campaigns);

          loadingEl.style.display = 'none';
          detailContent.style.display = 'block';
        } catch (err) {
          loadingEl.style.display = 'none';
          errorEl.textContent = err.message;
          errorEl.classList.remove('d-none');
        }
      }

      document.getElementById('credits-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const form = e.target;
        const btn = form.querySelector('[type="submit"]');
        const amount = parseFloat(form.amount.value, 10);
        if (!amount || amount < 1000) return;

        btn.disabled = true;
        try {
          await api(`/api/admin/users/${userId}/wallet`, {
            method: 'POST',
            body: JSON.stringify({ amount })
          });
          showToast(`Added UGX ${amount.toLocaleString()} to wallet`);
          form.reset();
          await loadUser();
        } catch (err) {
          showToast(err.message, 'error');
        } finally {
          btn.disabled = false;
        }
      });

      document.getElementById('plan-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = e.target.querySelector('[type="submit"]');
        const plan = document.getElementById('plan-select').value;

        btn.disabled = true;
        try {
          await api(`/api/admin/users/${userId}/plan`, {
            method: 'PUT',
            body: JSON.stringify({ plan })
          });
          showToast('Plan updated');
          await loadUser();
        } catch (err) {
          showToast(err.message, 'error');
        } finally {
          btn.disabled = false;
        }
      });

      document.getElementById('status-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = e.target.querySelector('[type="submit"]');
        const status = document.getElementById('status-select').value;

        btn.disabled = true;
        try {
          await api(`/api/admin/users/${userId}/status`, {
            method: 'PUT',
            body: JSON.stringify({ status })
          });
          showToast('Status updated');
          await loadUser();
        } catch (err) {
          showToast(err.message, 'error');
        } finally {
          btn.disabled = false;
        }
      });

      loadUser();
    })();
  </script>
</body>
</html>
