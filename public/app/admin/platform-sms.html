<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Platform SMS - AfrieConnect Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="/assets/css/app.css" rel="stylesheet">
</head>
<body>
  <div id="app-shell"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/assets/js/app.js"></script>
  <script>
    (function () {
      if (!requireAuth() || !requireAdmin()) return;

      renderAppShell('admin-sms');

      const content = document.getElementById('page-content');
      content.innerHTML = `
        <div class="mb-4">
          <h1 class="h4 mb-1">Platform SMS</h1>
          <p class="text-muted mb-0">Send SMS on behalf of the platform</p>
        </div>

        <div class="row g-4">
          <div class="col-lg-5">
            <div class="content-card">
              <h2 class="h6 mb-3">Send Message</h2>
              <form id="sms-form">
                <div class="mb-3">
                  <label class="form-label">Recipients</label>
                  <textarea class="form-control" name="recipients" rows="5" required
                    placeholder="One phone per line, or comma-separated&#10;e.g. 256700000001"></textarea>
                  <div class="form-text">Separate numbers with newlines, commas, or semicolons.</div>
                </div>
                <div class="mb-3">
                  <label class="form-label">Sender ID</label>
                  <input type="text" class="form-control" name="sender_id" maxlength="11" value="AfrieCon"
                    placeholder="AfrieCon">
                </div>
                <div class="mb-3">
                  <label class="form-label">Message</label>
                  <textarea class="form-control" name="message" rows="4" required
                    placeholder="Your message here..."></textarea>
                  <div class="form-text"><span id="char-count">0</span> characters</div>
                </div>
                <button type="submit" class="btn btn-primary w-100" id="sms-submit">
                  <i class="bi bi-send me-1"></i> Send SMS
                </button>
              </form>
            </div>
          </div>

          <div class="col-lg-7">
            <div class="content-card">
              <div class="d-flex align-items-center justify-content-between mb-3">
                <h2 class="h6 mb-0">Send Log</h2>
                <button class="btn btn-sm btn-outline-secondary" id="btn-refresh-logs">
                  <i class="bi bi-arrow-clockwise"></i> Refresh
                </button>
              </div>
              <div id="logs-loading" class="text-center py-4">
                <div class="spinner-border spinner-border-sm text-primary" role="status"></div>
              </div>
              <div id="logs-error" class="alert alert-danger d-none"></div>
              <div class="table-responsive" id="logs-table-wrap" style="display:none">
                <table class="table table-sm table-hover align-middle mb-0">
                  <thead class="table-light">
                    <tr>
                      <th>Date</th>
                      <th>Admin</th>
                      <th>Sender</th>
                      <th>Recipients</th>
                      <th>Status</th>
                      <th>Cost</th>
                    </tr>
                  </thead>
                  <tbody id="logs-tbody"></tbody>
                </table>
              </div>
              <p id="logs-empty" class="text-muted text-center py-3 d-none">No platform SMS logs yet.</p>
            </div>
          </div>
        </div>
      `;

      const messageEl = document.querySelector('[name="message"]');
      const charCountEl = document.getElementById('char-count');
      const logsLoading = document.getElementById('logs-loading');
      const logsError = document.getElementById('logs-error');
      const logsTableWrap = document.getElementById('logs-table-wrap');
      const logsTbody = document.getElementById('logs-tbody');
      const logsEmpty = document.getElementById('logs-empty');

      function escapeHtml(str) {
        if (!str) return '';
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
      }

      function truncate(str, len) {
        if (!str) return '-';
        return str.length > len ? str.slice(0, len) + '...' : str;
      }

      messageEl.addEventListener('input', () => {
        charCountEl.textContent = messageEl.value.length;
      });

      async function loadLogs() {
        logsLoading.style.display = 'block';
        logsError.classList.add('d-none');
        logsTableWrap.style.display = 'none';
        logsEmpty.classList.add('d-none');

        try {
          const data = await api('/api/admin/platform-sms-logs');
          const logs = data.logs || [];

          logsLoading.style.display = 'none';

          if (!logs.length) {
            logsEmpty.classList.remove('d-none');
            return;
          }

          logsTbody.innerHTML = logs.map(log => `
            <tr>
              <td class="small text-muted">${formatDate(log.sent_at)}</td>
              <td class="small">${escapeHtml(log.admin_name || '-')}</td>
              <td class="small">${escapeHtml(log.sender_id || '-')}</td>
              <td class="small" title="${escapeHtml(log.recipients)}">${escapeHtml(truncate(log.recipients, 30))}</td>
              <td>${statusBadge(log.status || 'unknown')}</td>
              <td class="small">${log.cost ? `${log.cost} ${log.currency || 'UGX'}` : '-'}</td>
            </tr>
          `).join('');

          logsTableWrap.style.display = 'block';
        } catch (err) {
          logsLoading.style.display = 'none';
          logsError.textContent = err.message;
          logsError.classList.remove('d-none');
        }
      }

      document.getElementById('sms-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const form = e.target;
        const btn = document.getElementById('sms-submit');
        const defaultHtml = btn.innerHTML;

        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span> Sending...';

        try {
          const result = await api('/api/admin/sms/send', {
            method: 'POST',
            body: JSON.stringify({
              recipients: form.recipients.value,
              sender_id: form.sender_id.value.trim() || 'AfrieCon',
              message: form.message.value
            })
          });

          if (result.success) {
            showToast(result.message || 'SMS sent successfully');
            form.message.value = '';
            charCountEl.textContent = '0';
            loadLogs();
          } else {
            showToast(result.message || 'Send failed', 'error');
          }
        } catch (err) {
          showToast(err.message, 'error');
        } finally {
          btn.disabled = false;
          btn.innerHTML = defaultHtml;
        }
      });

      document.getElementById('btn-refresh-logs').addEventListener('click', loadLogs);
      loadLogs();
    })();
  </script>
</body>
</html>
