<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SMS Gateways - AfrieConnect Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="/assets/css/app.css" rel="stylesheet">
</head>
<body>
<div id="app-shell"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/assets/js/app.js"></script>
<script src="/assets/js/admin-gateways.js"></script>
<script>
(function () {
  if (!requireAuth() || !requireAdmin()) return;
  renderAppShell('admin-sms-gateways');

  document.getElementById('page-content').innerHTML = `
    <div class="mb-4">
      <h4 class="mb-1 fw-bold">SMS Gateways</h4>
      <p class="text-muted mb-0">Add and manage SMS providers — EgoSMS, Africa's Talking, Twilio, and more.</p>
    </div>
    <div id="gateways-root"><div class="text-center py-5 text-muted">Loading gateways…</div></div>
  `;

  loadAdminGateways('sms').catch(err => showToast(err.message, 'error'));
})();
</script>
</body>
</html>
