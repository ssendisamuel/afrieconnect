<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — AfrieConnect</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="/assets/css/app.css" rel="stylesheet">
</head>
<body class="bg-grid auth-page">

  <div class="container px-3">
    <div class="auth-card mx-auto">
      <div class="text-center mb-4">
        <a class="brand-logo d-inline-block mb-3" href="/index.html">
          <span style="color:#dc2626">Afrie</span><span class="brand-sms">Connect</span>
        </a>
        <h4 class="fw-bold mb-1">Welcome Back</h4>
        <p class="text-muted small">Sign in to your account</p>
      </div>

      <div id="auth-alert"></div>

      <form id="login-form">
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" name="email" class="form-control" placeholder="you@company.com" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" name="password" class="form-control" placeholder="••••••••" required>
        </div>
        <div class="d-flex justify-content-between align-items-center mb-4">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="remember" name="remember">
            <label class="form-check-label small" for="remember">Remember me</label>
          </div>
          <a href="/forgot-password.html" class="small text-primary">Forgot password?</a>
        </div>
        <button type="submit" class="btn btn-primary-custom w-100 btn-lg" data-default-text="Sign In">Sign In</button>
      </form>

      <p class="text-center small mt-3 mb-0">
        <a href="#" id="resend-verify-link" class="text-primary fw-semibold">Resend verification email</a>
      </p>

      <p class="text-center text-muted small mt-3 mb-0">
        Don't have an account? <a href="/register.html" class="text-primary fw-semibold">Create one free</a>
      </p>
    </div>
  </div>

  <script src="/assets/js/auth.js?v=2"></script>
</body>
</html>
