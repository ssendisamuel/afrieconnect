<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password — AfrieConnect</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="/assets/css/app.css" rel="stylesheet">
</head>
<body class="bg-grid auth-page">

  <div class="container px-3">
    <div class="auth-card mx-auto">
      <div class="text-center mb-4">
        <a class="brand-logo d-inline-block mb-3" href="/index.html">
          <span style="color:#dc2626">Afrie</span><span class="brand-sms">Connect</span>
        </a>
        <h4 class="fw-bold mb-1">Forgot Password</h4>
        <p class="text-muted small">Enter your email and we'll send a reset link</p>
      </div>

      <div id="auth-alert"></div>

      <form id="forgot-form">
        <div class="mb-4">
          <label class="form-label">Email Address</label>
          <input type="email" name="email" class="form-control" placeholder="you@company.com" required>
        </div>
        <button type="submit" class="btn btn-primary-custom w-100 btn-lg" data-default-text="Send Reset Link">Send Reset Link</button>
      </form>

      <p class="text-center text-muted small mt-4 mb-0">
        Remember your password? <a href="/login.html" class="text-primary fw-semibold">Sign in</a>
      </p>
    </div>
  </div>

  <script src="/assets/js/auth.js"></script>
</body>
</html>
