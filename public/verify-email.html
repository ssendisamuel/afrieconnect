<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify Email — AfrieConnect</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="/assets/css/app.css" rel="stylesheet">
</head>
<body class="bg-grid auth-page">

  <div class="container px-3">
    <div class="auth-card mx-auto text-center">
      <a class="brand-logo d-inline-block mb-4" href="/index.html">
        <span style="color:#dc2626">Afrie</span><span class="brand-sms">Connect</span>
      </a>

      <div class="mb-4">
        <div class="spinner-border text-primary mb-3" role="status" id="verify-spinner">
          <span class="visually-hidden">Verifying...</span>
        </div>
        <h4 class="fw-bold mb-2">Verifying Your Email</h4>
        <p class="text-muted small">Please wait while we confirm your account...</p>
      </div>

      <div id="verify-status"></div>

      <a href="/login.html" class="btn btn-primary-custom mt-3">Go to Login</a>
    </div>
  </div>

  <script src="/assets/js/auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const observer = new MutationObserver(() => {
        const spinner = document.getElementById('verify-spinner');
        if (document.getElementById('verify-status').innerHTML && spinner) {
          spinner.classList.add('d-none');
        }
      });
      observer.observe(document.getElementById('verify-status'), { childList: true });
    });
  </script>
</body>
</html>
